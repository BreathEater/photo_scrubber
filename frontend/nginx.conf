server {
	listen 80;

	# to reconsider:
	server_name localhost;



	location / {
		   proxy_pass http://api:8000; 
		   proxy_set_header Host $host;
		   proxy_set_header X-Real-IP $remote_addr;

	}
	location /api/ {
		   proxy_pass http://api:8000; 
		   proxy_set_header Host $host;
		   client_max_body_size 20M;
	       }
}


	
