<div id="photosView" class="hidden mt-8 font-mono text-sm p-4 border-2 border-dashed border-transparent transition-all">
       <div class="flex justify-between items-center text-slate-500 mb-2">
           <span>photos of /staged_for_scrubbing</span>
           <span class="text-xs">(Drop more files to add)</span>
       </div>
       <hr class="mb-4">
       <table class="w-full">
           <tbody id="photosList"></tbody>
       </table>
       <div class="mt-8 flex justify-between items-center">
           <button onclick="fileStaging.clear()" class="text-red-500 hover:underline">[ Clear All ]</button>
           <button id="batchScrubBtn" class="border-2 border-black px-4 py-1 font-bold hover:bg-black hover:text-white">
              SCRUB PHOTOS 
           </button>
       </div>
   </div>

   <script>
       (function() {
           const view = document.getElementById('photosView');
           const list = document.getElementById('photosList');

           // Logic: Keep adding files if they are dropped on the tree
           view.ondragover = (e) => { e.preventDefault(); view.classList.add('bg-slate-100', 'border-slate-300'); };
           view.ondragleave = () => { view.classList.remove('bg-slate-100', 'border-slate-300'); };
           view.ondrop = (e) => {
               e.preventDefault();
               view.classList.remove('bg-slate-100', 'border-slate-300');
               window.fileStaging.add(e.dataTransfer.files);
           };

           document.addEventListener('stager-updated', () => {
               const queue = window.fileStaging.queue;
               view.classList.toggle('hidden', queue.length === 0);

               list.innerHTML = queue.map((file, i) => `
                   <tr class="hover:bg-slate-50">
                       <td class="py-1 truncate" style="max-width: 300px;">${file.name}</td>
                       <td class="py-1 text-right text-slate-400">${(file.size / 1024).toFixed(1)}K</td>
                       <td class="py-1 text-right">
                           <a href="#" onclick="fileStaging.remove(${i}); return false;" class="text-red-600">delete</a>
                       </td>
                   </tr>
               `).join('');
           });

           document.getElementById('batchScrubBtn').onclick = async () => {
               if (window.fileStaging.queue.length === 0) return;
               document.dispatchEvent(new CustomEvent('upload-start'));

               const formData = new FormData();
               window.fileStaging.queue.forEach(f => formData.append('files', f));

               try {
                   const res = await fetch('/api/scrub', { method: 'POST', body: formData });
                   const blob = await res.blob();
                   document.dispatchEvent(new CustomEvent('upload-success', {
                       detail: { blob, filename: `scrubbed_${Date.now()}.zip` }
                   }));
                   window.fileStaging.clear();
               } catch (e) { alert('Failed'); document.dispatchEvent(new CustomEvent('upload-error')); }
           };
       })();
   </script>
