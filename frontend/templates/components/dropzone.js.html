<div id="dropZone" class="drop-zone bg-white rounded-2xl p-12 text-center flex flex-col items-center justify-center cursor-pointer shadow-xl">
    <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mb-4">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
    </div>
    <h3 class="text-lg font-semibold">Drop your photo here</h3>
    <p class="text-slate-500 text-sm mt-1">We'll strip all EXIF, GPS, and MakerNotes </p>
    <input type="file" id="fileInput" class="hidden" accept="image/*">
</div>

<script>
    (function() {
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('active'); };
        dropZone.ondragleave = () => dropZone.classList.remove('active');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('active');
            handleUpload(e.dataTransfer.files[0]);
        };
        fileInput.onchange = (e) => handleUpload(e.target.files[0]);

        async function handleUpload(file) {
            if (!file) return;

            // Signal other components (Status/Result) to react
            document.dispatchEvent(new CustomEvent('upload-start'));

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/scrub', { method: 'POST', body: formData });
                if (!response.ok) throw new Error('Scrub failed');

                const blob = await response.blob();
                
                // Signal completion with the data
                document.dispatchEvent(new CustomEvent('upload-success', { 
                    detail: { blob, filename: file.name } 
                }));
                
                // Refresh global stats
                document.dispatchEvent(new CustomEvent('stats-update'));

            } catch (err) {
                alert('Scrubbing failed.');
                document.dispatchEvent(new CustomEvent('upload-error'));
            }
        }
    })();
</script>
