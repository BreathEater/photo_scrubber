 <div id="dropZone" class="drop-zone bg-white rounded-2xl p-12 text-center flex flex-col items-center justify-center cursor-pointer shadow-xl">
       <h3 class="text-lg font-semibold">Drop photos here</h3>
       <input type="file" id="fileInput" class="hidden" multiple accept="image/*">
   </div>

   <script>
       (function() {
           const dropZone = document.getElementById('dropZone');
           const fileInput = document.getElementById('fileInput');

           document.addEventListener('stager-updated', () => {
               dropZone.classList.toggle('hidden', window.fileStaging.queue.length > 0);
           });

           dropZone.onclick = () => fileInput.click();
           dropZone.ondrop = (e) => { e.preventDefault(); window.fileStaging.add(e.dataTransfer.files); };
           fileInput.onchange = (e) => window.fileStaging.add(e.target.files);

           dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('active'); };
           dropZone.ondragleave = () => dropZone.classList.remove('active');
       })();
   </script>
