<div id="result" class="mt-6 hidden bg-green-50 border border-green-200 rounded-xl p-6 flex flex-col shadow-lg">
       <div class="flex justify-between items-center w-full">
           <div>
               <h4 class="text-green-800 font-bold">Successfully Scrubbed!</h4>
               <p class="text-green-600 text-sm italic">Privacy metadata removed.</p>
           </div>
           <a id="downloadBtn" href="#" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-semibold transition">
               Download ZIP
           </a>
       </div>

       <details class="mt-4 border-t border-green-200 pt-4">
           <summary class="text-[10px] text-green-700 cursor-pointer hover:underline uppercase font-mono">
               View Raw Deletion Log
           </summary>
           <pre id="rawLog" class="mt-2 p-2 bg-white/50 text-[9px] font-mono text-slate-600 overflow-auto max-h-48 whitespace-pre-wrap border border-green-100
   rounded"></pre>
       </details>
   </div>

   <script>
       (function() {
           const result = document.getElementById('result');
           const downloadBtn = document.getElementById('downloadBtn');
           const rawLog = document.getElementById('rawLog');

           document.addEventListener('upload-success', (e) => {
               const { sessionId, log } = e.detail;

               // 1. Point download button to the API
               downloadBtn.href = `/api/download/${sessionId}`;

               // 2. Insert the log text
               rawLog.innerText = log || "No log generated.";

               // 3. Show card
               result.classList.remove('hidden');
           });

           document.addEventListener('upload-start', () => result.classList.add('hidden'));
       })();
   </script>
