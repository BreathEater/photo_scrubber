<!DOCTYPE html>
   <html lang="en">
   <head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>Photo Scrubber | Clean Your Metadata</title>
       <script src="https://cdn.tailwindcss.com"></script>
       <style>
           .drop-zone { border: 2px dashed #cbd5e1; transition: all 0.3s ease; }
           .drop-zone.active { border-color: #3b82f6; background-color: #eff6ff; }
       </style>
   </head>
   <body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">

       <!-- Header -->
       <header class="p-6 bg-white shadow-sm border-b">
           <div class="max-container mx-auto flex justify-between items-center">
               <h1 class="text-2xl font-bold text-slate-800">✨ Photo Scrubber</h1>
               <div id="stats" class="text-sm font-medium text-slate-500 bg-slate-100 px-3
   py-1 rounded-full">
                   Loading stats...
               </div>
           </div>
       </header>

       <main class="flex-grow container mx-auto max-w-2xl px-6 py-12">
           <!-- Upload Section -->
           <div id="dropZone" class="drop-zone bg-white rounded-2xl p-12 text-center flex
   flex-col items-center justify-center cursor-pointer shadow-xl">
               <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center
   justify-center mb-4">
                   <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24
   24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0
   003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
               </div>
               <h3 class="text-lg font-semibold">Drop your photo here</h3>
               <p class="text-slate-500 text-sm mt-1">We'll strip all EXIF, GPS, and
   MakerNotes </p>
               <input type="file" id="fileInput" class="hidden" accept="image/*">
           </div>

           <!-- Processing State -->
           <div id="status" class="mt-6 hidden text-center">
               <div class="animate-spin inline-block w-8 h-8 border-4 border-blue-500
   border-t-transparent rounded-full mb-2"></div>
               <p class="text-slate-600 font-medium">Scrubbing metadata...</p>
           </div>

           <!-- Result Section -->
           <div id="result" class="mt-6 hidden bg-green-50 border border-green-200 rounded-xl
   p-6 flex justify-between items-center animate-bounce">
               <div>
                   <h4 class="text-green-800 font-bold">Successfully Scrubbed!</h4>
                   <p class="text-green-600 text-sm">All privacy-leaking metadata has been
   removed.</p>
               </div>
               <a id="downloadBtn" href="#" class="bg-green-600 hover:bg-green-700 text-white
   px-4 py-2 rounded-lg font-semibold transition shadow-md">
                   Download
               </a>
           </div>
       </main>

       <script>
           const dropZone = document.getElementById('dropZone');
           const fileInput = document.getElementById('fileInput');
           const result = document.getElementById('result');
           const status = document.getElementById('status');
           const downloadBtn = document.getElementById('downloadBtn');

           // Fetch Global Stats
           async function fetchStats() {
               try {
                   const res = await fetch('/api/stats');
                   const data = await res.json();
                   document.getElementById('stats').innerText = `Photos scrubbed 🏆: ${data.photos_cleaned}`;
               } catch (e) {}
           }

           dropZone.onclick = () => fileInput.click();

           dropZone.ondragover = (e) => { e.preventDefault();
   dropZone.classList.add('active'); };
           dropZone.ondragleave = () => dropZone.classList.remove('active');

           dropZone.ondrop = (e) => {
               e.preventDefault();
               dropZone.classList.remove('active');
               handleUpload(e.dataTransfer.files[0]);
           };

           fileInput.onchange = (e) => handleUpload(e.target.files[0]);

           async function handleUpload(file) {
               if (!file) return;
               status.classList.remove('hidden');
               result.classList.add('hidden');

               const formData = new FormData();
               formData.append('file', file);

               try {
                   const response = await fetch('/api/scrub', { method: 'POST', body: formData });

                   if (!response.ok) {
                       const errorText = await response.text();
                       throw new Error(errorText || 'Server error during scrubbing');
                   }

                   const blob = await response.blob();
                   const url = window.URL.createObjectURL(blob);

                   downloadBtn.href = url;
                   downloadBtn.download = `scrubbed_${file.name}`;

                   status.classList.add('hidden');
                   result.classList.remove('hidden');
                   fetchStats();
               } catch (err) {
                   alert('Scrubbing failed. Check backend.');
                   status.classList.add('hidden');
               }
           }

           fetchStats();
       </script>
   </body>
   </html>
