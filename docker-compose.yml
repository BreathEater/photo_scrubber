services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: scrubber_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  api:
    build: ./backend
    depends_on:
      - db
    environment: 
     DATABASE_URL: postgresql://{$BAU_DB_USER}:{$BAU_DB_PASSWORD}@db:5432/scrubber_db
    volumes:
      - ./backend:/app
    restart: always

  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    depends_on:
      - api
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend:/usr/share/nginx/html
    restart: always


volumes:
  pgdata:
